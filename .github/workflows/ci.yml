name: CI

# Lint + test only. Deliberately does NOT run harvest/build/eval/scout here —
# those need GitHub/Reddit API credentials and a locally installed `claude`
# CLI that this runner doesn't have. See deployment_spec.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make install-dev

      - name: Lint + test
        run: make check
