# Hiring-committee gate: after a draft passes eval, each voter below scores it
# 1-5 on usefulness/uniqueness/quality/safety (see prompts/committee.md). The
# overall average across all voters and dimensions decides library/ vs trash/.
committee:
  # Overall average (1-5) a candidate needs to be auto-promoted to library/.
  passing_score: 3.5
  # Minimum number of voters that must successfully return a score before a
  # verdict is reached at all; below this the draft is left alone for
  # `make review` instead of being auto-decided on partial data.
  min_voters: 5
  voters:
    - name: CEO
      focus: Strategic value and ROI of adding and maintaining this skill.
    - name: CTO
      focus: Technical correctness and long-term maintainability of the instructions.
    - name: Solution Architect
      focus: Uniqueness versus the existing library catalog; overlap/redundancy with what's already there.
    - name: Security Lead
      focus: Safety — free of destructive actions, prompt-injection risk, or unsafe credential handling.
    - name: QA Lead
      focus: Clarity and testability of the steps — would a reviewer know if it worked?

# LLM Council gate: runs after committee.py hires a draft, before anything is
# promoted. Five advisors (mirrors .claude/skills/llm-council) each vote
# add/skip on whether the candidate is worth adding given the existing
# library/ catalog, then a chairman synthesizes one final decision (see
# prompts/council_advisor.md, prompts/council_chairman.md). "skip" trashes
# the draft automatically; "add" leaves it in drafts/ for `make review`.
council:
  advisors:
    - name: The Contrarian
      lens: Search for fatal flaws and overlooked risks in adding this — argue for *not* adding it if a good case exists.
    - name: The First Principles Thinker
      lens: Question whether this is really a new capability or just a rephrasing of something already in the library.
    - name: The Expansionist
      lens: Look for upside — does this cover real ground the existing library doesn't, even if it overlaps partially?
    - name: The Outsider
      lens: Judge with no attachment to either the candidate or the existing library — is this obviously redundant bookkeeping, or a genuine gap being filled?
    - name: The Executor
      lens: Focus on practical outcome — if added, would anyone actually reach for this over what's already there?
